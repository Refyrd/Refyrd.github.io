<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RefyrdSnake</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body data-color="green">

    <canvas id="confettiCanvas"></canvas>

    <div class="branding">
        <div class="name">Refyrd</div>
        <div class="vibe">vibecode</div>
    </div>

    <div class="header">
        <div class="score-box">
            <div class="score-title" id="uiScoreTitle">Счет</div>
            <div class="score-value" id="score">0</div>
        </div>
        <a href="https://github.com/Refyrd/Refyrd.github.io" target="_blank" class="header-github">GitHub</a>
        <div class="header-actions">
            <button class="icon-btn" id="authBtn" title="Sign in">👤</button>
            <button class="icon-btn" id="langToggle">EN</button>
            <button class="icon-btn" id="themeToggle">☀️</button>
            <button class="icon-btn" id="fbToggle" title="Feedback">💬</button>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="overlay active" id="startMenu">
            <div class="menu-inner">
                <div class="menu-title" id="uiMainTitle">ЗМЕЙКА</div>
                <div class="high-score" id="menuHighScoreText">Лучший счет: 0</div>
                <div class="last-score" id="menuLastScoreText">Последний счет: 0</div>
                
                <input type="text" id="playerNameInput" class="name-input" placeholder="Твой никнейм" maxlength="12" autocomplete="off">

                <div class="size-picker">
                    <button class="size-btn" data-size="10">10x10</button>
                    <button class="size-btn active" data-size="20">20x20</button>
                    <button class="size-btn" data-size="40">40x40</button>
                </div>

                <div class="color-picker">
                    <button class="color-btn active" data-c="green" style="background-color: #4CAF50;"></button>
                    <button class="color-btn" data-c="blue" style="background-color: #2196F3;"></button>
                    <button class="color-btn" data-c="red" style="background-color: #F44336;"></button>
                    <button class="color-btn" data-c="purple" style="background-color: #9C27B0;"></button>
                </div>
                <div class="button-group">
                    <button class="btn-primary" id="uiPlayBtn">Играть</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="gameOverScreen">
            <div class="menu-inner">
                <div class="menu-title" id="uiGameOverTitle" style="color: var(--md-sys-color-error)">Конец игры</div>
                <div class="high-score"><span id="uiFinalScoreText">Счет: </span><span id="finalScore">0</span></div>
                
                <div class="button-group">
                    <button class="btn-primary" id="uiRestartBtn">Начать заново</button>
                    <button class="btn-secondary" id="uiMenuBtn">В меню</button>
                </div>
            </div>
        </div>

        <div id="devMenu">
                <div class="menu-title" id="uiDevTitle" style="color: var(--md-sys-color-primary)">DEV</div>
                <div class="high-score">Refyrd.dev</div>
            
            <div class="button-group">
                <button class="btn-secondary" id="uiDevConfetti">Конфетти</button>
                <button class="btn-secondary" id="uiDevGlow">Свечение змеи</button>
                <button class="btn-secondary" id="uiDevAddScore">+10 очков</button>
                <button class="btn-secondary" id="uiDevFill">Длинная змейка</button>
                <button class="btn-primary" id="uiDevClose">Закрыть</button>
            </div>
        </div>
    </div>

    <div class="leaderboard" id="leaderboard">
        <h3 id="lbTitle">LEADERBOARD</h3>
        <div id="leaderboardList"><div class="lb-loading" id="lbLoadingText">Loading...</div></div>
        <div class="lb-status" id="lbStatus"><span class="dot connecting"></span><span id="lbStatusText">Connecting...</span></div>
        <button class="lb-show-more" id="lbShowMore">Show all</button>
    </div>

    <div id="feedbackPanel">
        <div class="feedback-header">
            <span id="fbTitle">Feedback</span>
            <button class="icon-btn" id="fbClose">&times;</button>
        </div>
        <div class="feedback-list" id="feedbackList">
            <div class="lb-loading">Loading...</div>
        </div>
        <div class="feedback-form" id="feedbackForm">
            <input type="text" id="fbNameInput" class="name-input" placeholder="Your name" maxlength="20" autocomplete="off">
            <textarea id="fbMessageInput" class="fb-textarea" placeholder="Write your thoughts about the game..." rows="3" maxlength="500"></textarea>
            <button class="btn-primary" id="fbSubmit">Send</button>
            <div class="fb-status" id="fbStatus"></div>
        </div>
    </div>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-modal">
            <button class="auth-close" id="authClose">&times;</button>

            <div id="authMainView">
                <div class="auth-title" id="authTitle">Sign In</div>
                <div class="auth-social">
                    <button class="auth-social-btn auth-email-btn" id="authEmailBtn">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-.4 4.25l-6.54 4.09c-.65.41-1.47.41-2.12 0L4.4 8.25c-.25-.16-.4-.43-.4-.72 0-.67.73-1.07 1.3-.72L12 11l6.7-4.19c.57-.35 1.3.05 1.3.72 0 .29-.15.56-.4.72z"/></svg>
                        Sign in with Email
                    </button>
                </div>
                <div class="auth-divider"><span>or</span></div>
                <div class="auth-social">
                    <button class="auth-social-btn" id="authGoogle">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        Sign in with Google
                    </button>
                    <button class="auth-social-btn" id="authGithub">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                        Sign in with GitHub
                    </button>
                </div>
                <div class="auth-status" id="authStatus"></div>
            </div>

            <div id="authEmailView" style="display:none">
                <button class="auth-back" id="authEmailBack">&larr; Back</button>
                <div class="auth-title" id="authEmailTitle">Email</div>
                <input type="email" id="authEmail" class="name-input" placeholder="Email" autocomplete="email">
                <input type="password" id="authPassword" class="name-input" placeholder="Password" autocomplete="current-password">
                <button class="btn-primary" id="authEmailSignIn">Sign In</button>
                <input type="text" id="authRegNick" class="name-input" style="display:none" placeholder="Nickname" maxlength="12" autocomplete="off">
                <button class="btn-secondary" id="authEmailRegister">Register</button>
                <div class="auth-status" id="authEmailStatus"></div>
            </div>

            <div id="authAccountView" style="display:none">
                <div class="auth-title">Account</div>
                <div class="auth-info-line" id="accEmail"></div>

                <div class="auth-acc-section">
                    <div class="auth-acc-label">Linked providers</div>
                    <div class="auth-providers" id="accProviders"></div>
                    <div class="auth-acc-label">Link another</div>
                    <div class="auth-providers">
                        <button class="auth-prov-btn" data-prov="google">+ Google</button>
                        <button class="auth-prov-btn" data-prov="github">+ GitHub</button>
                        <button class="auth-prov-btn" id="accLinkEmailBtn" data-prov="password">+ Email</button>
                    </div>
                </div>

                <div class="auth-acc-section">
                    <div class="auth-acc-label">Nickname</div>
                    <div style="display:flex; gap:8px; width:100%; align-items:center">
                        <div style="position:relative; flex:1">
                            <input type="text" id="accNickInput" class="name-input" placeholder="Nickname" maxlength="12" autocomplete="off" style="width:100%">
                            <span id="accNickLock" style="display:none; position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none">🔒</span>
                        </div>
                        <button class="btn-primary" id="accNickSave" style="width:auto; padding:0 20px; flex-shrink:0">Save</button>
                    </div>
                    <div id="accNickStatus" style="font-size:11px; opacity:0.6; text-align:center; width:100%"></div>
                </div>

                <button class="auth-social-btn" id="authSignOutBtn" style="margin-top:4px">Sign Out</button>

                <div id="authLinkEmailView" style="display:none; width:100%">
                    <hr style="width:100%; opacity:0.2; margin:8px 0">
                    <div style="display:flex; align-items:center; gap:8px; width:100%">
                        <button class="auth-back" id="authLinkEmailBack">&larr;</button>
                        <div class="auth-title" style="flex:1; text-align:left">Link Email</div>
                    </div>
                    <input type="email" id="authLinkEmail" class="name-input" placeholder="Email" autocomplete="email">
                    <input type="password" id="authLinkPassword" class="name-input" placeholder="Password" autocomplete="new-password">
                    <button class="btn-primary" id="authLinkEmailLink">Link</button>
                    <div class="auth-status" id="authLinkEmailStatus"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>
</html>
