<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RefyrdSnake</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* === Базовые и светлые переменные (MD3) === */
        :root {
            --md-sys-color-surface: #fdfdf5;
            --md-sys-color-on-surface: #1a1c18;
            --md-sys-color-surface-container: #eef0e5;
            --md-sys-color-game-board: #e4e6db; 
            --md-sys-color-error: #ba1a1a;
            
            --elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.15), 0px 1px 2px 0px rgba(0, 0, 0, 0.3);
            --elevation-3: 0px 1px 3px 0px rgba(0, 0, 0, 0.3), 0px 4px 8px 3px rgba(0, 0, 0, 0.15);
        }

        /* === Глубокая тёмная тема === */
        [data-theme="dark"] {
            --md-sys-color-surface: #0f0f0f;
            --md-sys-color-on-surface: #e3e3e3;
            --md-sys-color-surface-container: #1e1e1e;
            --md-sys-color-game-board: #161616; 
            --md-sys-color-error: #ffb4ab;
            
            --elevation-2: 0px 2px 6px 2px rgba(0, 0, 0, 0.4), 0px 1px 2px 0px rgba(0, 0, 0, 0.5);
            --elevation-3: 0px 1px 3px 0px rgba(0, 0, 0, 0.5), 0px 4px 8px 3px rgba(0, 0, 0, 0.4);
        }

        /* === Цветовые акценты (обычные фиксированные цвета) === */
        [data-theme="light"][data-color="green"] { --md-sys-color-primary: #386a20; --md-sys-color-primary-container: #b7f397; }
        [data-theme="light"][data-color="blue"] { --md-sys-color-primary: #0062a2; --md-sys-color-primary-container: #d1e4ff; }
        [data-theme="light"][data-color="red"] { --md-sys-color-primary: #b3261e; --md-sys-color-primary-container: #f9dedc; }
        [data-theme="light"][data-color="purple"] { --md-sys-color-primary: #6750a4; --md-sys-color-primary-container: #eaddff; }

        [data-theme="dark"][data-color="green"] { --md-sys-color-primary: #9cd67d; --md-sys-color-primary-container: #205107; }
        [data-theme="dark"][data-color="blue"] { --md-sys-color-primary: #9fc9ff; --md-sys-color-primary-container: #00497d; }
        [data-theme="dark"][data-color="red"] { --md-sys-color-primary: #f2b8b5; --md-sys-color-primary-container: #8c1d18; }
        [data-theme="dark"][data-color="purple"] { --md-sys-color-primary: #d0bcff; --md-sys-color-primary-container: #4f378b; }

        /* === Базовые стили и шрифты === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Google Sans Flex', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html[lang="ru"], html[lang="ru"] * {
            font-family: 'Google Sans', system-ui, sans-serif !important;
        }

        body, .header, #gameCanvas, .overlay, .btn-primary, .btn-secondary, .color-btn, .size-btn, .name-input,
        .leaderboard, .lb-entry, .lb-status, #devMenu, .branding .name {
            transition: background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, color 0.35s ease;
        }

        body {
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px 0;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        
        .branding { text-align: center; margin-bottom: clamp(12px, 3vh, 24px); position: relative; z-index: 10; }
        .branding .name { font-size: clamp(24px, 6vw, 32px); font-weight: 800; color: var(--md-sys-color-primary); letter-spacing: -0.5px; line-height: 1.1; }
        .branding .vibe { font-size: clamp(12px, 3vw, 14px); font-weight: 500; opacity: 0.7; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; max-width: min(400px, 100vw - 32px); height: clamp(56px, 9vh, 72px); padding: 0 clamp(12px, 4vw, 20px); margin-bottom: clamp(12px, 2vh, 16px);
            background-color: var(--md-sys-color-surface-container);
            border-radius: 16px; box-shadow: var(--elevation-2); position: relative; z-index: 10;
        }

        .score-box { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .score-title { font-size: clamp(10px, 2.8vw, 12px); font-weight: 500; color: var(--md-sys-color-primary); text-transform: uppercase; letter-spacing: 0.1em; }
        .score-value { font-size: clamp(20px, 5.5vw, 28px); font-weight: 800; line-height: 1; }

        .header-actions { display: flex; gap: clamp(4px, 1.5vw, 8px); flex: 0 0 auto; justify-content: flex-end; }
        .icon-btn { 
            background: none; border: none; color: var(--md-sys-color-on-surface); 
            font-size: clamp(16px, 4.5vw, 20px); cursor: pointer; padding: 6px; border-radius: 50%; 
            font-weight: 800; display: flex; align-items: center; justify-content: center;
            width: clamp(32px, 8vw, 40px); height: clamp(32px, 8vw, 40px);
        }
        .icon-btn:active { background-color: rgba(128, 128, 128, 0.2); }

        /* Игровой контейнер: строгий квадрат, вписанный в экран по обеим осям */
        .game-container { 
            position: relative; 
            width: min(400px, 100vw - 32px); 
            height: min(400px, 100vw - 32px, 78vh);
            z-index: 10; 
            margin: 0 auto;
        }
        
        #gameCanvas { 
            width: 100%; 
            height: 100%; 
            background-color: var(--md-sys-color-game-board); 
            border-radius: 16px; 
            box-shadow: var(--elevation-3); 
            display: block; 
        }

        .overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--md-sys-color-surface-container);
            opacity: 0; border-radius: 16px; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; pointer-events: none;
            padding: clamp(8px, 3%, 16px);
            overflow-y: auto;
            z-index: 20;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .overlay::-webkit-scrollbar { display: none; }

        /* Меню разработчика — боковая панель, не перекрывает игру */
        #devMenu {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: min(260px, 80vw);
            background-color: var(--md-sys-color-surface-container);
            box-shadow: var(--elevation-3);
            display: flex; flex-direction: column;
            align-items: stretch; justify-content: flex-start;
            padding: 16px; gap: 10px;
            overflow-y: auto; z-index: 80;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        #devMenu::-webkit-scrollbar { display: none; }
        #devMenu.active { transform: translateX(0); }
        #devMenu .menu-title { font-size: 20px; }
        #devMenu .high-score { font-size: 13px; margin-bottom: 4px; }
        #devMenu .button-group { width: 100%; max-width: none; gap: 8px; }
        .overlay.active { opacity: 1; pointer-events: all; }

        /* Внутренний столбец меню: адаптивная ширина внутри поля */
        .menu-inner {
            display: flex; flex-direction: column; align-items: center;
            width: 100%;
            margin: auto 0;
            gap: clamp(6px, 1.8vh, 14px);
        }

        .menu-title { font-size: clamp(20px, 6vw, 34px); font-weight: 800; color: var(--md-sys-color-primary); text-transform: uppercase; text-align: center; line-height: 1.05; word-wrap: break-word;}
        .high-score { font-size: clamp(12px, 3vw, 16px); font-weight: 500; text-align: center; }
        .last-score { font-size: clamp(10px, 2.5vw, 14px); font-weight: 500; text-align: center; opacity: 0.7; }

        .name-input {
            width: 100%; max-width: 260px; height: clamp(34px, 6vh, 48px); border-radius: 12px;
            border: 2px solid transparent; background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface); padding: 0 16px; font-size: clamp(13px, 3.5vw, 16px);
            font-weight: 600; text-align: center; outline: none; box-shadow: var(--elevation-2);
        }
        .name-input::placeholder { color: var(--md-sys-color-on-surface); opacity: 0.5; font-weight: 500; }
        .name-input:focus { border-color: var(--md-sys-color-primary); box-shadow: 0 0 0 4px var(--md-sys-color-primary-container); }

        .size-picker { display: flex; border: 1px solid var(--md-sys-color-primary); border-radius: 100px; overflow: hidden; background-color: var(--md-sys-color-surface); }
        .size-btn { background: transparent; color: var(--md-sys-color-on-surface); border: none; padding: clamp(6px, 1.2vh, 12px) clamp(12px, 3.5vw, 22px); font-size: clamp(11px, 2.8vw, 14px); font-weight: 600; cursor: pointer; }
        .size-btn.active { background-color: var(--md-sys-color-primary); color: var(--md-sys-color-surface); }

        .color-picker { display: flex; gap: clamp(8px, 2.5vw, 14px); }
        .color-btn { width: clamp(26px, 8vw, 40px); height: clamp(26px, 8vw, 40px); border-radius: 50%; border: 3px solid transparent; cursor: pointer; box-shadow: var(--elevation-2); }
        .color-btn.active { transform: scale(1.15); border-color: var(--md-sys-color-on-surface); }

        .button-group { display: flex; flex-direction: column; gap: clamp(8px, 2vh, 14px); width: 100%; max-width: 260px; align-items: center; }
        .btn-primary, .btn-secondary { width: 100%; border-radius: 100px; height: clamp(36px, 6.5vh, 50px); font-size: clamp(13px, 3.5vw, 16px); font-weight: 600; cursor: pointer; }
        .btn-primary { background-color: var(--md-sys-color-primary); color: var(--md-sys-color-surface); border: none; box-shadow: var(--elevation-2); }
        .btn-primary:active { transform: scale(0.95); }
        .btn-secondary { background-color: transparent; color: var(--md-sys-color-primary); border: 2px solid var(--md-sys-color-primary); }
        .btn-secondary:active { transform: scale(0.95); background-color: var(--md-sys-color-primary-container); }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .lb-toggle {
            position: fixed;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 51;
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-surface);
            border: none;
            border-radius: 0 12px 12px 0;
            width: 28px;
            height: 48px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--elevation-2);
            transition: left 0.35s ease, background-color 0.35s ease, color 0.35s ease;
        }
        .lb-toggle:hover { opacity: 0.9; }
        .lb-toggle.closed { left: 0; }
        .leaderboard {
            position: fixed;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            background-color: var(--md-sys-color-surface-container);
            border-radius: 16px;
            box-shadow: var(--elevation-2);
            padding: 16px;
            display: flex;
            flex-direction: column;
            max-height: min(500px, 80vh);
            overflow-y: auto;
            scrollbar-width: thin;
            z-index: 50;
            transition: transform 0.35s ease, opacity 0.35s ease, background-color 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease, color 0.35s ease;
        }
        .leaderboard.hidden {
            transform: translateY(-50%) translateX(-240px);
            opacity: 0;
            pointer-events: none;
        }
        .leaderboard h3 {
            font-size: 14px;
            font-weight: 800;
            color: var(--md-sys-color-primary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 12px;
            text-align: center;
        }
        .lb-entry {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        .lb-entry:nth-child(1) { background-color: rgba(255,215,0,0.1); }
        .lb-entry:nth-child(2) { background-color: rgba(192,192,192,0.08); }
        .lb-entry:nth-child(3) { background-color: rgba(205,127,50,0.06); }
        .lb-entry .lb-rank {
            width: 22px;
            text-align: center;
            font-weight: 800;
            color: var(--md-sys-color-primary);
            flex-shrink: 0;
        }
        .lb-entry .lb-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .lb-entry .lb-score {
            font-weight: 800;
            flex-shrink: 0;
        }
        .lb-empty {
            text-align: center;
            font-size: 13px;
            opacity: 0.5;
            padding: 20px 0;
        }
        .lb-loading {
            text-align: center;
            font-size: 13px;
            opacity: 0.5;
            padding: 20px 0;
        }
        .lb-status {
            font-size: 11px;
            padding: 8px 8px 0;
            opacity: 0.5;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .lb-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }
        .lb-status .dot.online { background-color: #4CAF50; }
        .lb-status .dot.connecting { background-color: #FFC107; animation: pulse-dot 1s infinite; }
        .lb-status .dot.error { background-color: #F44336; }
        .lb-status .dot.offline { background-color: #9E9E9E; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        @media (max-width: 640px) {
            .lb-toggle { display: none; }
            .leaderboard {
                position: static;
                transform: none;
                width: 100%;
                max-width: 400px;
                max-height: none;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 4px;
                padding: 12px;
                margin-top: 12px;
            }
            .leaderboard.hidden {
                transform: none;
                opacity: 1;
                pointer-events: all;
            }
            .leaderboard h3 { width: 100%; margin-bottom: 8px; font-size: 12px; }
            .lb-entry { font-size: 12px; padding: 4px 6px; flex: 1; min-width: 80px; }
        }

    </style>
</head>
<body data-color="green">

    <canvas id="confettiCanvas"></canvas>

    <button class="lb-toggle" id="lbToggle">◀</button>
    <div class="leaderboard" id="leaderboard">
        <h3 id="lbTitle">LEADERBOARD</h3>
        <div id="leaderboardList"><div class="lb-loading" id="lbLoadingText">Loading...</div></div>
        <div class="lb-status" id="lbStatus"><span class="dot connecting"></span><span id="lbStatusText">Connecting...</span></div>
    </div>

    <div class="branding">
        <div class="name">Refyrd</div>
        <div class="vibe">vibecoded by Hy3</div>
    </div>

    <div class="header">
        <div class="score-box">
            <div class="score-title" id="uiScoreTitle">Счет</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="langToggle">EN</button>
            <button class="icon-btn" id="themeToggle">☀️</button>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div class="overlay active" id="startMenu">
            <div class="menu-inner">
                <div class="menu-title" id="uiMainTitle">ЗМЕЙКА</div>
                <div class="high-score" id="menuHighScoreText">Лучший счет: 0</div>
                <div class="last-score" id="menuLastScoreText">Последний счет: 0</div>
                
                <input type="text" id="playerNameInput" class="name-input" placeholder="Твой никнейм" maxlength="12" autocomplete="off">

                <div class="size-picker">
                    <button class="size-btn" data-size="10">10x10</button>
                    <button class="size-btn active" data-size="20">20x20</button>
                    <button class="size-btn" data-size="40">40x40</button>
                </div>

                <div class="color-picker">
                    <button class="color-btn active" data-c="green" style="background-color: #4CAF50;"></button>
                    <button class="color-btn" data-c="blue" style="background-color: #2196F3;"></button>
                    <button class="color-btn" data-c="red" style="background-color: #F44336;"></button>
                    <button class="color-btn" data-c="purple" style="background-color: #9C27B0;"></button>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" id="uiPlayBtn" onclick="startGame()">Играть</button>
                </div>
            </div>
        </div>

        <div class="overlay" id="gameOverScreen">
            <div class="menu-inner">
                <div class="menu-title" id="uiGameOverTitle" style="color: var(--md-sys-color-error)">Конец игры</div>
                <div class="high-score"><span id="uiFinalScoreText">Счет: </span><span id="finalScore">0</span></div>
                
                <div class="button-group">
                    <button class="btn-primary" id="uiRestartBtn" onclick="startGame()">Начать заново</button>
                    <button class="btn-secondary" id="uiMenuBtn" onclick="showMenu()">В меню</button>
                </div>
            </div>
        </div>

        <div id="devMenu">
                <div class="menu-title" id="uiDevTitle" style="color: var(--md-sys-color-primary)">DEV</div>
                <div class="high-score">Refyrd.dev</div>
            
            <div class="button-group">
                <button class="btn-secondary" id="uiDevConfetti" onclick="triggerConfetti()">Конфетти</button>
                <button class="btn-secondary" id="uiDevGlow" onclick="devGlow()">Свечение змеи</button>
                <button class="btn-secondary" id="uiDevAddScore" onclick="devAddScore()">+10 очков</button>
                <button class="btn-secondary" id="uiDevFill" onclick="devFillSnake()">Длинная змейка</button>
                <button class="btn-primary" id="uiDevClose" onclick="closeDevMenu()">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        // === ЛОКАЛИЗАЦИЯ ===
        const i18n = {
            en: { scoreTitle: "SCORE", mainTitle: "SNAKE", bestScore: "Best score: ", lastScore: "Last score: ", placeholder: "Your nickname", playBtn: "Play", gameOverTitle: "Game Over", finalScoreText: "Score: ", restartBtn: "Restart", menuBtn: "Menu", lbTitle: "LEADERBOARD", devTitle: "DEV", devConfetti: "Confetti", devGlow: "Glow", devAddScore: "+10 Score", devFill: "Fill Snake", devClose: "Close", lbNoScores: "No scores yet", lbLoading: "Loading...", lbOffline: "Offline" },
            ru: { scoreTitle: "СЧЕТ", mainTitle: "ЗМЕЙКА", bestScore: "Лучший счет: ", lastScore: "Последний счет: ", placeholder: "Твой никнейм", playBtn: "Играть", gameOverTitle: "Конец игры", finalScoreText: "Счет: ", restartBtn: "Начать заново", menuBtn: "В меню", lbTitle: "ТАБЛИЦА", devTitle: "ДЕВ", devConfetti: "Конфетти", devGlow: "Свечение", devAddScore: "+10 очков", devFill: "Длинная змейка", devClose: "Закрыть", lbNoScores: "Пока нет результатов", lbLoading: "Загрузка...", lbOffline: "Офлайн" }
        };

        let currentLang = 'en'; 
        const browserLang = navigator.language || navigator.userLanguage;
        if (browserLang && browserLang.toLowerCase().startsWith('ru')) currentLang = 'ru';

        const savedLang = localStorage.getItem('snakeLanguage');
        if (savedLang === 'ru' || savedLang === 'en') currentLang = savedLang;

        const langToggle = document.getElementById('langToggle');

        function applyLanguage() {
            document.documentElement.lang = currentLang;
            langToggle.innerText = currentLang.toUpperCase();
            
            document.getElementById('uiScoreTitle').innerText = i18n[currentLang].scoreTitle;
            document.getElementById('uiMainTitle').innerText = i18n[currentLang].mainTitle;
            document.getElementById('playerNameInput').placeholder = i18n[currentLang].placeholder;
            document.getElementById('uiPlayBtn').innerText = i18n[currentLang].playBtn;
            document.getElementById('uiGameOverTitle').innerText = i18n[currentLang].gameOverTitle;
            document.getElementById('uiFinalScoreText').innerText = i18n[currentLang].finalScoreText;
            document.getElementById('uiRestartBtn').innerText = i18n[currentLang].restartBtn;
            document.getElementById('uiMenuBtn').innerText = i18n[currentLang].menuBtn;
            
            document.querySelector('.leaderboard h3').innerText = i18n[currentLang].lbTitle;
            document.getElementById('uiDevTitle').innerText = i18n[currentLang].devTitle;
            document.getElementById('uiDevConfetti').innerText = i18n[currentLang].devConfetti;
            document.getElementById('uiDevGlow').innerText = i18n[currentLang].devGlow;
            document.getElementById('uiDevAddScore').innerText = i18n[currentLang].devAddScore;
            document.getElementById('uiDevFill').innerText = i18n[currentLang].devFill;
            document.getElementById('uiDevClose').innerText = i18n[currentLang].devClose;
            
            if (playerNameInput.disabled) {
                playerNameInput.placeholder = currentLang === 'en' ? 'DEV MODE' : 'ДЕВ РЕЖИМ';
            }
            
            const lbLoading = document.getElementById('lbLoadingText');
            if (lbLoading) lbLoading.innerText = i18n[currentLang].lbLoading;
            
            updateHighScoreDisplay();
        }

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('snakeLanguage', currentLang);
            applyLanguage();
        });


        // === ТЕМА И СИСТЕМНЫЙ ЦВЕТ ===
        const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        let isDark = !prefersLight; 
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');

        function getResolvedColor(cssVarName) {
            const temp = document.createElement('div');
            temp.style.color = cssVarName;
            document.body.appendChild(temp);
            const color = getComputedStyle(temp).color;
            temp.remove();
            return color;
        }

        function applyTheme() {
            body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeToggle.innerText = isDark ? '☀️' : '🌙';
        }
        applyTheme();

        themeToggle.addEventListener('click', () => { isDark = !isDark; applyTheme(); });

        // === ВЫБОР ЦВЕТА И РАЗМЕРА ===
        const colorBtns = document.querySelectorAll('.color-btn');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                colorBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                body.setAttribute('data-color', btn.getAttribute('data-c'));
            });
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let tileCount = 20;
        let gridSize = 20;
        const sizeBtns = document.querySelectorAll('.size-btn');

        // Подгоняем реальное разрешение canvas под размер контейнера (с учётом DPR).
        // Пересчитываем буфер только при реальном изменении размера — иначе каждый кадр.
        let lastCanvasW = 0, lastCanvasH = 0;
        function syncCanvasSize() {
            const rect = canvas.getBoundingClientRect();
            if (rect.width < 1 || rect.height < 1) return;
            const dpr = window.devicePixelRatio || 1;
            const w = Math.max(1, Math.round(rect.width * dpr));
            const h = Math.max(1, Math.round(rect.height * dpr));
            if (w !== lastCanvasW || h !== lastCanvasH) {
                canvas.width = w;
                canvas.height = h;
                lastCanvasW = w;
                lastCanvasH = h;
                // Берём меньшую сторону, чтобы сетка всегда была квадратной
                const side = Math.min(canvas.width, canvas.height);
                gridSize = side / tileCount;
            }
        }

        sizeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                sizeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                tileCount = parseInt(btn.getAttribute('data-size'));
                gridSize = canvas.width / tileCount;
            });
        });

        // === FIREBASE LEADERBOARD ===
        const firebaseConfig = {
            apiKey: "AIzaSyBqT2PpyNjfI97TCq7A38XaV8eDJ8Qx6fM",
            authDomain: "refyrdsnake.firebaseapp.com",
            projectId: "refyrdsnake",
            storageBucket: "refyrdsnake.firebasestorage.app",
            messagingSenderId: "358595828224",
            appId: "1:358595828224:web:eec89884a7d78f467a16e5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const LEADERBOARD_COLLECTION = 'leaderboard';

        const leaderboardList = document.getElementById('leaderboardList');
        const lbStatus = document.getElementById('lbStatus');

        let lbConnectionState = 'connecting';

        function setLbStatus(state, msg) {
            lbConnectionState = state;
            const dotClass = state === 'online' ? 'online' : state === 'connecting' ? 'connecting' : state === 'error' ? 'error' : 'offline';
            lbStatus.innerHTML = `<span class="dot ${dotClass}"></span><span>${escapeHtml(msg)}</span>`;
        }

        async function saveScoreToLeaderboard() {
            if (!savedName || score <= 0) return;
            if (savedName === 'Refyrd.dev') return;
            try {
                const docRef = db.collection(LEADERBOARD_COLLECTION).doc(savedName);
                const existing = await docRef.get();

                if (existing.exists) {
                    const existingScore = existing.data().score || 0;
                    if (score <= existingScore) {
                        loadLeaderboard();
                        return;
                    }
                }

                await docRef.set({
                    name: savedName,
                    score: score
                });
            } catch (e) {
                console.warn('Firebase save error:', e);
                setLbStatus('error', `Save error: ${e.message}`);
            }
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            try {
                const snapshot = await db.collection(LEADERBOARD_COLLECTION)
                    .orderBy('score', 'desc')
                    .limit(10)
                    .get();
                setLbStatus('online', 'Online');
                if (snapshot.empty) {
                    leaderboardList.innerHTML = `<div class="lb-empty">${i18n[currentLang].lbNoScores}</div>`;
                    return;
                }
                let html = '';
                let rank = 1;
                snapshot.forEach(doc => {
                    const d = doc.data();
                    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
                    html += `<div class="lb-entry">
                        <span class="lb-rank">${medal || rank}</span>
                        <span class="lb-name">${escapeHtml(d.name || '???')}</span>
                        <span class="lb-score">${d.score || 0}</span>
                    </div>`;
                    rank++;
                });
                leaderboardList.innerHTML = html;
            } catch (e) {
                console.warn('Firebase load error:', e);
                setLbStatus('error', `Error: ${e.message}`);
                leaderboardList.innerHTML = `<div class="lb-empty">${i18n[currentLang].lbOffline}</div>`;
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        loadLeaderboard();

        const lbToggle = document.getElementById('lbToggle');
        const lbPanel = document.getElementById('leaderboard');
        let lbOpen = true;
        lbToggle.addEventListener('click', () => {
            lbOpen = !lbOpen;
            lbPanel.classList.toggle('hidden', !lbOpen);
            lbToggle.innerText = lbOpen ? '◀' : '▶';
            lbToggle.classList.toggle('closed', !lbOpen);
        });

        const confettiCanvas = document.getElementById('confettiCanvas');
        const cCtx = confettiCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startMenu = document.getElementById('startMenu');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const menuHighScoreText = document.getElementById('menuHighScoreText');
        const menuLastScoreText = document.getElementById('menuLastScoreText');
        const playerNameInput = document.getElementById('playerNameInput');

        const initialSpeed = 150; 
        const maxSpeed = 70;
        const speedDecrease = 2;

        let snake = [];
        let food = {};
        let dx = 0, dy = 0;
        let score = 0;
        
        let bestScore = localStorage.getItem('snakeHighScore') || 0;
        let lastScore = localStorage.getItem('snakeLastScore') || 0; 
        let savedName = localStorage.getItem('snakePlayerName') || '';
        playerNameInput.value = savedName;

        let currentSpeed = initialSpeed;
        let isRunning = false;
        let lastTickTime = 0;
        let inputQueue = [];
        let particles = [];
        
        let glows = []; 
        
        function updateHighScoreDisplay() {
            const nameDisplay = savedName ? ` (${savedName})` : '';
            menuHighScoreText.innerText = `${i18n[currentLang].bestScore}${bestScore}${nameDisplay}`;
            if (lastScore > 0) {
                menuLastScoreText.style.display = 'block';
                menuLastScoreText.innerText = `${i18n[currentLang].lastScore}${lastScore}`;
            } else {
                menuLastScoreText.style.display = 'none';
            }
        }
        
        applyLanguage();

        function resizeConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConfetti);
        resizeConfetti();

        // Фоновый таймер: гонит игровую логику по реальному времени даже когда
        // вкладка свёрнута (rAF не работает в фоне), чтобы змейка продолжала
        // движение и нельзя было «читерить» паузой. При возврате все пропущенные
        // тики обрабатываются в advanceLogic, так что рывка нет.
        setInterval(() => {
            if (isRunning) advanceLogic(performance.now());
        }, 50);

        function showMenu() {
            gameOverScreen.classList.remove('active');
            devMenu.classList.remove('active');
            playerNameInput.disabled = false;
            playerNameInput.placeholder = i18n[currentLang].placeholder;
            startMenu.classList.add('active');
            isRunning = false;
            updateHighScoreDisplay();
            resetGameState();
        }

        function startGame() {
            savedName = playerNameInput.value.trim();
            if (savedName) localStorage.setItem('snakePlayerName', savedName);
            
            startMenu.classList.remove('active');
            gameOverScreen.classList.remove('active');
            // Снимаем фокус с кнопки, иначе пробел повторно её активирует и сбросит игру
            if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
            
            resetGameState();
            syncCanvasSize();
            placeFood();
            isRunning = true;
            lastTickTime = performance.now();
        }

        // === МЕНЮ РАЗРАБОТЧИКА ===
        const devMenu = document.getElementById('devMenu');

        playerNameInput.addEventListener('input', () => {
            if (playerNameInput.value.trim().toLowerCase() === 'refyrd.dev') {
                devMenu.classList.add('active');
                playerNameInput.disabled = true;
                savedName = '';
                playerNameInput.value = '';
                playerNameInput.placeholder = currentLang === 'en' ? 'DEV MODE' : 'ДЕВ РЕЖИМ';
            }
        });

        function closeDevMenu() {
            devMenu.classList.remove('active');
            playerNameInput.disabled = false;
            playerNameInput.placeholder = i18n[currentLang].placeholder;
            playerNameInput.value = savedName || '';
        }

        // Запуск одной волны свечения: узкая полоса бежит от головы до хвоста
        function devGlow() {
            glows = [{ pos: 0 }];
        }

        // Добавить очки (для теста конфетти на каждые 10)
        function devAddScore() {
            score += 10;
            scoreElement.innerText = score;
            triggerConfetti();
        }

        // Длинная змейка: +10 к счёту и +10 сегментов для теста
        function devFillSnake() {
            score += 10;
            scoreElement.innerText = score;
            if (score % 10 === 0) triggerConfetti();
            const tail = snake[snake.length - 1];
            for (let i = 0; i < 10; i++) {
                snake.push({ x: tail.x, y: tail.y, rx: tail.x, ry: tail.y });
            }
        }

        function resetGameState() {
            syncCanvasSize();
            const center = Math.floor(tileCount / 2);
            snake = [
                { x: center, y: center, rx: center, ry: center },
                { x: center, y: center + 1, rx: center, ry: center + 1 },
                { x: center, y: center + 2, rx: center, ry: center + 2 }
            ];
            dx = 0; dy = -1;
            score = 0;
            currentSpeed = initialSpeed;
            inputQueue = [];
            glows = [];
            scoreElement.innerText = score;
        }

        // Продвигает игровую логику по реальному времени (обрабатывает все
        // пропущенные тики, чтобы змейка двигалась даже в свёрнутом табе)
        function advanceLogic(now) {
            if (!isRunning) return;
            let guard = 0;
            while (now - lastTickTime >= currentSpeed && guard < 2000) {
                updateLogic();
                lastTickTime += currentSpeed;
                guard++;
                if (!isRunning) break;
            }
        }

        function animationLoop(timestamp) {
            // Синхронизируем разрешение canvas с контейнером каждый кадр
            // (фикс: при возврате окна в нормальный размер игра не растягивалась)
            syncCanvasSize();

            if (isRunning) {
                advanceLogic(timestamp);
                
                glows.forEach(g => g.pos += 0.12);
                glows = glows.filter(g => g.pos < snake.length + 4);
            }

            // Плавная интерполяция позиций сегментов к целевым (движение без дёрганий)
            const lerp = 0.35;
            for (let s of snake) {
                s.rx += (s.x - s.rx) * lerp;
                s.ry += (s.y - s.ry) * lerp;
            }
            
            drawGame();
            updateConfetti();
            requestAnimationFrame(animationLoop);
        }

        function updateLogic() {
            if (inputQueue.length > 0) {
                const nextDir = inputQueue.shift();
                dx = nextDir.dx; dy = nextDir.dy;
            }

            const head = { x: snake[0].x + dx, y: snake[0].y + dy, rx: snake[0].x, ry: snake[0].y };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || checkSelfCollision(head)) {
                handleGameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreElement.innerText = score;
                if (currentSpeed > maxSpeed) currentSpeed -= speedDecrease;
                if (score > 0 && score % 10 === 0) triggerConfetti();
                
                glows = [{ pos: 0 }];
                placeFood();
            } else {
                snake.pop();
            }
        }

        function checkSelfCollision(head) {
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) return true;
            }
            return false;
        }

        function drawGrid() {
            ctx.strokeStyle = isDark ? 'rgba(255, 255, 255, 0.03)' : 'rgba(0, 0, 0, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        // Преобразует любой CSS-цвет в rgba(...) с заданной прозрачностью
        function toRGBA(color, alpha) {
            tempColorCtx.fillStyle = color;
            const computed = tempColorCtx.fillStyle;
            if (computed.startsWith('#')) {
                let hex = computed.slice(1);
                if (hex.length === 3) hex = hex.split('').map(x => x + x).join('');
                const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
                return `rgba(${r},${g},${b},${alpha})`;
            }
            const m = computed.match(/rgba?\(([^)]+)\)/);
            if (m) {
                const parts = m[1].split(',').map(s => parseFloat(s));
                return `rgba(${parts[0]},${parts[1]},${parts[2]},${alpha})`;
            }
            return color;
        }

        const tempColorCanvas = document.createElement('canvas');
        const tempColorCtx = tempColorCanvas.getContext('2d');

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid(); 
            
            const style = getComputedStyle(document.body);
            let rawPrimary = style.getPropertyValue('--md-sys-color-primary').trim();
            if (rawPrimary === '') {
                rawPrimary = getResolvedColor('var(--md-sys-color-primary)');
            }

            const errorColor = style.getPropertyValue('--md-sys-color-error').trim();

            if (food.x !== undefined) {
                // Лёгкая пульсация яблока
                const pulse = 1 + Math.sin(performance.now() / 300) * 0.06;
                const foodSize = gridSize * 0.80 * pulse; 
                ctx.fillStyle = errorColor;
                ctx.beginPath();
                ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, foodSize / 2, 0, Math.PI * 2);
                ctx.fill();
            }

            const total = snake.length;
            for (let i = snake.length - 1; i >= 0; i--) {
                const segment = snake[i];
                // Плавно сужаем тело к хвосту: голова 0.85, хвост 0.45
                const t = total > 1 ? i / (total - 1) : 0;
                const sizeFactor = 0.85 - t * 0.40;
                const size = gridSize * sizeFactor;
                const padding = (gridSize - size) / 2;
                
                const cx = segment.rx * gridSize + gridSize / 2;
                const cy = segment.ry * gridSize + gridSize / 2;
                
                let maxGlowIntensity = 0;
                for (let g of glows) {
                    let dist = Math.abs(g.pos - i);
                    if (dist < 3.5) {
                        let intensity = 1 - (dist / 3.5);
                        if (intensity > maxGlowIntensity) maxGlowIntensity = intensity;
                    }
                }
                
                // Волна свечения бежит от головы (i=0) к хвосту
                let baseBrightness = (i === 0) ? 1.15 : 1.0;
                let finalBrightness = baseBrightness + (maxGlowIntensity * 0.3);

                // Слабое свечение-ореол ВОКРУГ тела в цвет темы
                if (maxGlowIntensity > 0) {
                    const glowR = size * 0.95;
                    const grad = ctx.createRadialGradient(cx, cy, size * 0.3, cx, cy, glowR);
                    grad.addColorStop(0, toRGBA(rawPrimary, 0.6 * maxGlowIntensity));
                    grad.addColorStop(0.5, toRGBA(rawPrimary, 0.25 * maxGlowIntensity));
                    grad.addColorStop(1, toRGBA(rawPrimary, 0));
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.filter = i === 0 ? `brightness(${baseBrightness})` : 'none';
                ctx.fillStyle = rawPrimary;
                ctx.beginPath();
                const radius = size * (i === 0 ? 0.40 : 0.30);
                ctx.roundRect(cx - size / 2, cy - size / 2, size, size, radius);
                ctx.fill();
            }
            
            ctx.filter = 'none';
        }

        function placeFood() {
            food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) { placeFood(); break; }
            }
        }

        function handleGameOver() {
            isRunning = false;
            
            lastScore = score;
            localStorage.setItem('snakeLastScore', lastScore);

            if (score > bestScore) { 
                localStorage.setItem('snakeHighScore', score); 
                bestScore = score; 
            }
            document.getElementById('finalScore').innerText = score;
            gameOverScreen.classList.add('active');
            saveScoreToLeaderboard();
        }

        function changeDirection(newDx, newDy) {
            if (inputQueue.length >= 2) return;
            const lastDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : {dx, dy};
            if (newDx === 1 && lastDir.dx !== -1) inputQueue.push({dx: 1, dy: 0});
            else if (newDx === -1 && lastDir.dx !== 1) inputQueue.push({dx: -1, dy: 0});
            else if (newDy === -1 && lastDir.dy !== 1) inputQueue.push({dx: 0, dy: -1});
            else if (newDy === 1 && lastDir.dy !== -1) inputQueue.push({dx: 0, dy: 1});
        }

        document.addEventListener('keydown', (e) => {
            if (document.activeElement === playerNameInput) {
                if (e.key === 'Enter') startGame();
                return;
            }
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight", " "].indexOf(e.code) > -1) e.preventDefault();
            switch(e.key) {
                case 'ArrowLeft': case 'a': case 'A': case 'ф': case 'Ф': changeDirection(-1, 0); break;
                case 'ArrowRight': case 'd': case 'D': case 'в': case 'В': changeDirection(1, 0); break;
                case 'ArrowUp': case 'w': case 'W': case 'ц': case 'Ц': changeDirection(0, -1); break;
                case 'ArrowDown': case 's': case 'S': case 'ы': case 'Ы': changeDirection(0, 1); break;
            }
        });

        const gameContainer = document.getElementById('gameContainer');
        let touchStartX = 0;
        let touchStartY = 0;

        gameContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        gameContainer.addEventListener('touchmove', e => {
            if (isRunning) e.preventDefault();
        }, { passive: false });

        gameContainer.addEventListener('touchend', e => {
            if (!isRunning) return;
            
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let diffX = touchEndX - touchStartX;
            let diffY = touchEndY - touchStartY;
            
            if (Math.max(Math.abs(diffX), Math.abs(diffY)) < 30) return;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) changeDirection(1, 0); 
                else changeDirection(-1, 0); 
            } else {
                if (diffY > 0) changeDirection(0, 1); 
                else changeDirection(0, -1);
            }
        }, { passive: true });

        function triggerConfetti() {
            const colors = ['#ffb4ab', '#b7f397', '#9cd67d', '#ffffff', '#386a20'];
            // Конфетти вылетает из четырёх углов экрана наружу
            const W = window.innerWidth, H = window.innerHeight;
            const corners = [
                { x: 0, y: 0, dx: 1, dy: 1 },
                { x: W, y: 0, dx: -1, dy: 1 },
                { x: 0, y: H, dx: 1, dy: -1 },
                { x: W, y: H, dx: -1, dy: -1 }
            ];
            for (const c of corners) {
                for (let i = 0; i < 25; i++) {
                    // Небольшой разброс вдоль краёв угла
                    const ox = c.dx * Math.random() * 60;
                    const oy = c.dy * Math.random() * 60;
                    particles.push(createParticle(c.x + ox, c.y + oy, c.dx, c.dy, colors));
                }
            }
        }

        function createParticle(x, y, dirX, dirY, colors) {
            return {
                x: x, y: y,
                vx: (Math.random() * 4 + 2) * dirX,
                vy: (Math.random() * 4 + 2) * dirY,
                color: colors[Math.floor(Math.random() * colors.length)],
                size: Math.random() * 10 + 9, rotation: Math.random() * 360, rs: (Math.random() - 0.5) * 8
            };
        }

        function updateConfetti() {
            cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rotation += p.rs;
                
                cCtx.save();
                cCtx.translate(p.x, p.y); cCtx.rotate(p.rotation * Math.PI / 180);
                cCtx.fillStyle = p.color;
                cCtx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                cCtx.restore();
                
                if (p.y > confettiCanvas.height + 20) particles.splice(i, 1);
            }
        }

        resetGameState();
        requestAnimationFrame(animationLoop);
    </script>
